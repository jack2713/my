name: Sync Files Between Repositories

on:
  workflow_dispatch:
    inputs:
      commit_message:
        description: 'Commit message'
        required: true
        default: 'Sync files from source repository'
  
  schedule:
    - cron: '0 0 * * *'
  
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/sync-files.yml'
      - 'sync_repos.py'

env:
  PYTHON_VERSION: '3.9'
  SOURCE_REPO: 'https://github.com/jack2713/my.git'
  TARGET_REPO: 'https://github.com/jack2713/mynew.git'
  SOURCE_FILE: 'myq.txt'
  TARGET_FILE: 'my.txt'

jobs:
  sync-files:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout this repository
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Set up Git
      run: |
        git config --global user.email "github-actions@github.com"
        git config --global user.name "GitHub Actions Bot"
        git config --global credential.helper cache
        git config --global credential.helper 'cache --timeout=300'
        
    - name: Run sync script
      env:
        SOURCE_TOKEN: ${{ secrets.SOURCE_REPO_TOKEN }}
        TARGET_TOKEN: ${{ secrets.TARGET_REPO_TOKEN }}
      run: |
        echo "开始同步文件..."
        echo "源仓库: ${{ env.SOURCE_REPO }}"
        echo "目标仓库: ${{ env.TARGET_REPO }}"
        
        python TMP/send.py \
          --source-token "$SOURCE_TOKEN" \
          --target-token "$TARGET_TOKEN" \
          --source-repo "${{ env.SOURCE_REPO }}" \
          --target-repo "${{ env.TARGET_REPO }}" \
          --source-file "${{ env.SOURCE_FILE }}" \
          --target-file "${{ env.TARGET_FILE }}" \
          --branch "main"
          
    - name: Verify sync result
      if: always()
      run: |
        echo "同步任务完成"
        echo "查看上方日志了解详细结果"

  test-sync:
    needs: sync-files
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Summary
      run: |
        echo "文件同步工作流执行完成"
        echo "如果看到 ✅ 表示成功"
        echo "如果看到 ❌ 请检查错误信息"
