name: Sync Files Between Repositories

on:
  # 手动触发
  workflow_dispatch:
    inputs:
      commit_message:
        description: 'Commit message'
        required: true
        default: 'Sync files from source repository'
  
  # 定时触发（每天UTC时间0点运行，可根据需要调整）
  schedule:
    - cron: '0 0 * * *'
  
  # 当源仓库有push事件时触发
  # 注意：需要在源仓库的Settings -> Webhooks中添加这个workflow的URL
  
  # 也可以监听仓库的特定事件
  # repository_dispatch:
  #   types: [sync-files]

jobs:
  sync-files:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout this repository
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        
    - name: Sync files from source to target repository
      env:
        SOURCE_TOKEN: ${{ secrets.SOURCE_REPO_TOKEN }}
        TARGET_TOKEN: ${{ secrets.TARGET_REPO_TOKEN }}
        COMMIT_MSG: ${{ github.event.inputs.commit_message || 'Sync files from source repository' }}
      run: |
        python sync_repos.py \
          --source-token "$SOURCE_TOKEN" \
          --target-token "$TARGET_TOKEN" \
          --source-file "myq.txt" \
          --target-file "my.txt" \
          --commit-message "$COMMIT_MSG"
