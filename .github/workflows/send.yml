name: Push File to Target Repository

on:
  # 手动触发
  workflow_dispatch:
    inputs:
      commit_message:
        description: '提交信息'
        required: false
        default: 'Auto sync from source repository'
      
  # 定时触发（每天UTC时间0点）
  schedule:
    - cron: '0 0 * * *'
  
  # 当源文件发生变化时触发
  push:
    paths:
      - 'myq.txt'
      - '.github/workflows/send.yml'
      - 'TMP/send.py'
  
  # 也可以设置webhook触发
  repository_dispatch:
    types: [trigger-sync]

env:
  TARGET_REPO: "https://github.com/jack2713/mynew.git"
  SOURCE_FILE: "myq.txt"
  TARGET_FILE: "my.txt"
  BRANCH: "main"

jobs:
  push-file:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write  # 允许写入内容
    
    steps:
    - name: 📥 检出源仓库
      uses: actions/checkout@v3
      with:
        fetch-depth: 1
        
    - name: 🐍 设置Python环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: 🔧 安装Git
      run: |
        sudo apt-get update
        sudo apt-get install -y git
        
    - name: 📋 显示环境信息
      run: |
        echo "工作目录: $(pwd)"
        echo "文件列表:"
        ls -la
        echo "源文件内容:"
        if [ -f "${{ env.SOURCE_FILE }}" ]; then
          head -n 10 "${{ env.SOURCE_FILE }}"
        else
          echo "源文件不存在"
        fi
        
    - name: 🚀 执行主动同步
      env:
        TARGET_REPO_TOKEN: ${{ secrets.TARGET_REPO_TOKEN }}
      run: |
        echo "开始主动同步到目标仓库..."
        echo "目标仓库: ${{ env.TARGET_REPO }}"
        echo "源文件: ${{ env.SOURCE_FILE }}"
        echo "目标文件: ${{ env.TARGET_FILE }}"
        
        python TMP/send.py
        
    - name: 📊 同步结果汇总
      if: always()
      run: |
        echo "====================================="
        echo "同步任务执行完成"
        echo "时间: $(date)"
        echo "仓库: ${{ github.repository }}"
        echo "触发事件: ${{ github.event_name }}"
        echo "====================================="
